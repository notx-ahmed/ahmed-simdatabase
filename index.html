<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🇵🇰 PAK Number to Info Tool | @DEADLINEHERE5</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0f1a;
      color: #00c3ff;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: #0a0f1a;
      border: 2px solid #0088ff;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0, 136, 255, 0.3);
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .header {
      background: #0a0f1a;
      padding: 20px;
      border-bottom: 2px solid #0088ff;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      text-shadow: 0 0 10px #0088ff;
      letter-spacing: 2px;
    }

    .header p {
      font-size: 14px;
      color: #0088ff;
      margin-top: 5px;
    }

    .input-area {
      padding: 30px;
    }

    .input-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .input-group input {
      flex: 3;
      background: #0a0f1a;
      border: 2px solid #0088ff;
      padding: 14px;
      color: #00c3ff;
      font-family: monospace;
      font-size: 16px;
      border-radius: 8px;
      outline: none;
      transition: 0.2s;
    }

    .input-group input:focus {
      box-shadow: 0 0 12px #0088ff;
      border-color: #00aaff;
    }

    .input-group button {
      flex: 1;
      background: #0a1a2a;
      border: 2px solid #0088ff;
      color: #00c3ff;
      font-family: monospace;
      font-weight: bold;
      padding: 14px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }

    .input-group button:hover {
      background: #0a2a3a;
      transform: scale(0.98);
      box-shadow: 0 0 12px #0088ff;
    }

    .btn-box {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn-box button {
      flex: 1;
      background: #0a1a2a;
      border: 2px solid #0088ff;
      padding: 10px;
      border-radius: 8px;
      color: #00c3ff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-box button:hover {
      background: #0a2a3a;
      box-shadow: 0 0 8px #0088ff;
    }

    .output {
      background: #0a0f1a;
      margin: 0 30px 30px 30px;
      border: 1px solid #0088ff;
      border-radius: 12px;
      overflow: hidden;
    }

    .output-header {
      background: #0a1a2a;
      padding: 12px 20px;
      border-bottom: 1px solid #0088ff;
      color: #00c3ff;
      font-size: 14px;
    }

    .output-content {
      padding: 20px;
      color: #00ffcc;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: monospace;
      font-size: 13px;
      max-height: 500px;
      overflow-y: auto;
    }

    .credit {
      text-align: center;
      padding: 15px;
      border-top: 1px solid #0088ff;
      color: #0088ff;
      font-size: 12px;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #00ccff;
      text-align: center;
    }

    .flag {
      font-size: 24px;
      vertical-align: middle;
    }

    @keyframes blink {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .loading {
      animation: blink 1s infinite;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><span class="flag">🇵🇰 </span>𝖕𝖆𝖐 𝖓𝖚𝖒𝖇𝖊𝖗 𝖙𝖔 𝖎𝖓𝖋𝖔 𝖙𝖔𝖔𝖑<span class="flag"> ⚠ </span></h1>
    <p>Pakistan Mobile Number OSINT | Live Data</p>
  </div>

  <div class="input-area">
    <div class="input-group">
      <input type="text" id="number" placeholder="Enter Pakistan number (e.g., 923078750447 or 03078750447)" autocomplete="off">
      <button id="lookupBtn">🔍 LOOKUP</button>
    </div>
    <div class="btn-box">
      <button id="copyBtn">📋 COPY JSON</button>
      <button id="clearBtn">🗑️ CLEAR</button>
      <button id="exampleBtn">📝 EXAMPLE</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <div class="output">
    <div class="output-header">📟 JSON OUTPUT</div>
    <div class="output-content" id="output">[*] Ready. Enter a Pakistan number and click LOOKUP.</div>
  </div>

  <div class="credit">
    ⦿ Powered by ┇ @NOTX_AHMED_
  </div>
</div>

<script>
  const BASE_URL = "https://api-server-virid-two.vercel.app/number=";
  let lastJSON = null;

  function formatNumber(raw) {
    let num = raw.replace(/\D/g, '');
    if (num.startsWith('92') && num.length === 12) return num;
    if (num.length === 10) return '92' + num;
    if (num.length === 11 && num.startsWith('0')) return '92' + num.slice(1);
    return num;
  }

  async function lookup() {
    const input = document.getElementById('number').value.trim();
    const outputDiv = document.getElementById('output');
    const statusDiv = document.getElementById('status');

    if (!input) {
      outputDiv.innerHTML = '{"error": "Enter a Pakistan number"}';
      statusDiv.innerHTML = '';
      return;
    }

    let formatted = formatNumber(input);
    if (!formatted.startsWith('92') || formatted.length !== 12) {
      outputDiv.innerHTML = '{"error": "Invalid Pakistan number. Use format like 923078750447 or 03078750447"}';
      statusDiv.innerHTML = '';
      return;
    }

    outputDiv.innerHTML = '{"status": "fetching..."}';
    statusDiv.innerHTML = '⏳ Fetching data...';
    statusDiv.className = 'status loading';

    try {
      const url = BASE_URL + formatted;
      const res = await fetch(url);
      let data = await res.json();

      // Clean up unwanted credits
      delete data.Credit;
      delete data.Developer;
      // Remove data_source if needed (optional)
      if (data.data) delete data.data.data_source;
      if (data.data && data.data.records) {
        data.data.records.forEach(rec => {
          delete rec.source; // if any
        });
      }

      // Add our credit
      data.credit = "@NOTX_AHMED_";

      lastJSON = data;
      outputDiv.innerHTML = JSON.stringify(data, null, 2);
      statusDiv.innerHTML = '✅ Lookup complete | @NOTX_AHMED_';
      statusDiv.className = 'status';
    } catch (err) {
      outputDiv.innerHTML = JSON.stringify({ error: err.message, credit: "@NOTX_AHMED_" }, null, 2);
      statusDiv.innerHTML = '❌ Network error | @NOTX_AHMED_';
      statusDiv.className = 'status';
    }
  }

  function copyJSON() {
    if (!lastJSON) {
      alert('No data to copy. Do a lookup first.');
      return;
    }
    const jsonStr = JSON.stringify(lastJSON, null, 2);
    navigator.clipboard.writeText(jsonStr).then(() => {
      const statusDiv = document.getElementById('status');
      statusDiv.innerHTML = '📋 JSON copied to clipboard! | @NOTX_AHMED_';
      setTimeout(() => {
        if (statusDiv.innerHTML.includes('copied')) statusDiv.innerHTML = '';
      }, 2000);
    }).catch(() => alert('Failed to copy.'));
  }

  function clearAll() {
    document.getElementById('number').value = '';
    document.getElementById('output').innerHTML = '[*] Ready.';
    lastJSON = null;
    document.getElementById('status').innerHTML = '';
  }

  function example() {
    document.getElementById('number').value = '923078750447';
    lookup();
  }

  document.getElementById('lookupBtn').addEventListener('click', lookup);
  document.getElementById('copyBtn').addEventListener('click', copyJSON);
  document.getElementById('clearBtn').addEventListener('click', clearAll);
  document.getElementById('exampleBtn').addEventListener('click', example);
  document.getElementById('number').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') lookup();
  });
</script>
</body>
</html>
